<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buddy - Companion Robot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="robot-avatar" id="robotAvatar">
                <div class="antenna left" id="antennaLeft"></div>
                <div class="antenna right" id="antennaRight"></div>
                <div class="face">
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                </div>
            </div>
            <div class="header-info">
                <h1>Buddy</h1>
                <p class="status" id="status">Connecting...</p>
            </div>
            <select id="voiceSelect" class="voice-select" onchange="changeVoice(this.value)">
                <option value="en-funny">🎭 Funny Irish</option>
                <option value="en-aussie">🦘 Aussie</option>
                <option value="en-us-female">🇺🇸 US - Aria</option>
                <option value="en-us-male">🇺🇸 US - Guy</option>
                <option value="en-gb-female">🇬🇧 UK - Sonia</option>
                <option value="ar-iq-female">🇮🇶 Iraqi - Rana</option>
                <option value="ar-iq-male">🇮🇶 Iraqi - Bassel</option>
                <option value="ar-eg-female">🇪🇬 Egyptian - Salma</option>
            </select>
            <button class="reset-btn" onclick="resetChat()" title="Reset conversation">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
            </button>
        </header>

        <!-- Chat Messages -->
        <div class="chat-container" id="chatContainer">
            <!-- Floating Buddy Avatar -->
            <div class="floating-buddy" id="floatingBuddy">
                <div class="buddy-antenna left" id="buddyAntennaL"></div>
                <div class="buddy-antenna right" id="buddyAntennaR"></div>
                <div class="buddy-head">
                    <div class="buddy-eye left" id="buddyEyeL"></div>
                    <div class="buddy-eye right" id="buddyEyeR"></div>
                    <div class="buddy-mouth" id="buddyMouth"></div>
                </div>
            </div>

            <div class="messages" id="messages">
                <!-- Messages will be added here -->
            </div>
        </div>

        <!-- Voice Input Area -->
        <div class="voice-area">
            <button id="micBtn" class="mic-btn" onclick="toggleListening()" title="Click to talk, click again to stop">
                <svg id="micIcon" width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/>
                    <path d="M19 11a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.92V21h-2a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-3.08A7 7 0 0 0 19 11z"/>
                </svg>
            </button>
            <p id="micHint" class="mic-hint">Click the mic and talk to Buddy</p>
            <p id="liveTranscript" class="live-transcript"></p>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <button onclick="sendQuickMessage('Tell me a joke!')">😄 Joke</button>
            <button onclick="sendQuickMessage('Do a happy spin!')">🔄 Spin</button>
            <button onclick="sendQuickMessage('How are you feeling?')">💭 Mood</button>
            <button id="voiceBtn" onclick="toggleVoice()">🔊 Speaker On</button>
        </div>
    </div>

    <script src="/static/main.js"></script>
</body>
</html>

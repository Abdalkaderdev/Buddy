<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f6efe2">
    <title>Sara</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Noto+Kufi+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-state="idle" data-lang="ar">
    <main class="stage">

        <!-- Top bar -->
        <header class="topbar">
            <div class="brand">
                <span class="brand-mark" aria-hidden="true"></span>
                <span class="brand-name" data-i18n="brand">سارة</span>
            </div>
            <div class="status-pill" id="statusPill">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="status" data-i18n="connecting">يتصل…</span>
            </div>
            <button class="icon-btn" id="settingsBtn" aria-label="Settings" title="Settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
            </button>
        </header>

        <!-- Ethical disclaimer (mental-health context) -->
        <div class="disclaimer" id="disclaimer" role="status" hidden>
            <p class="disclaimer-text" id="disclaimerText" data-i18n="disclaimerText">سارة مو طبيب نفسي. إذا كنت بأزمة، احكِ مع إنسان حقيقي.</p>
            <div class="disclaimer-actions">
                <a class="disclaimer-link" id="disclaimerLink" href="https://github.com/Abdalkaderdev/Sara/blob/main/RESOURCES.md" target="_blank" rel="noopener noreferrer" data-i18n="disclaimerLink">اقرأ المصادر الموثوقة</a>
                <button class="disclaimer-dismiss" id="disclaimerDismiss" type="button" data-i18n="disclaimerDismiss">فهمت</button>
            </div>
        </div>

        <!-- Presence + conversation -->
        <section class="presence-area">
            <div class="orb" id="orb" aria-hidden="true">
                <span class="orb-ring orb-ring--1"></span>
                <span class="orb-ring orb-ring--2"></span>
                <span class="orb-ring orb-ring--3"></span>
                <span class="orb-core"></span>
                <span class="orb-glow"></span>
            </div>

            <div class="exchange" id="exchange" aria-live="polite"></div>
        </section>

        <!-- Mic + transcript -->
        <section class="dock">
            <p class="transcript" id="liveTranscript" aria-live="polite"></p>

            <div class="mic-wrap">
                <button id="micBtn" class="mic" aria-label="Talk to Sara">
                    <span class="mic-pulse"></span>
                    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="3" width="6" height="12" rx="3"/>
                        <path d="M5 11a7 7 0 0 0 14 0"/>
                        <line x1="12" y1="18" x2="12" y2="22"/>
                    </svg>
                </button>
            </div>

            <p class="hint" id="micHint" data-i18n="tapToTalk">اضغط للحديث مع سارة</p>

            <div class="suggestions" id="suggestions">
                <button class="chip" data-i18n="suggest1" data-en="Tell me a joke" data-ar="احكِ لي نكتة">احكِ لي نكتة</button>
                <button class="chip" data-i18n="suggest2" data-en="How are you?" data-ar="كيف حالك اليوم؟">كيف حالك اليوم؟</button>
                <button class="chip" data-i18n="suggest3" data-en="Do a happy spin" data-ar="لِف لفّة فرح">لِف لفّة فرح</button>
            </div>
        </section>
    </main>

    <!-- Settings sheet -->
    <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
    <aside class="sheet" id="settingsSheet" hidden aria-labelledby="sheetTitle">
        <header class="sheet-head">
            <h2 id="sheetTitle" data-i18n="settings">الإعدادات</h2>
            <button class="icon-btn" id="closeSheet" aria-label="Close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                    <path d="M18 6 6 18M6 6l12 12"/>
                </svg>
            </button>
        </header>

        <div class="sheet-body">
            <section class="field">
                <label data-i18n="voice">الصوت</label>
                <div class="voice-grid" id="voiceGrid">
                    <!-- Buttons injected by JS -->
                </div>
            </section>

            <section class="field">
                <label data-i18n="interface">واجهة الاستخدام</label>
                <div class="lang-toggle" role="tablist">
                    <button data-lang="ar" class="lang-opt is-active">العربية</button>
                    <button data-lang="en" class="lang-opt">English</button>
                </div>
                <p class="field-note" data-i18n="langNote">يتبع الواجهة لغة الصوت المختار.</p>
            </section>

            <section class="field">
                <button class="ghost-btn" id="resetBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                    <span data-i18n="reset">امسح المحادثة</span>
                </button>
            </section>

            <button class="sheet-done" id="doneBtn" data-i18n-ar="تم" data-i18n-en="Done">تم</button>

            <footer class="sheet-foot">
                <span data-i18n="madeIn">صُنع في أربيل</span>
            </footer>
        </div>
    </aside>

    <script src="/static/main.js"></script>
</body>
</html>
